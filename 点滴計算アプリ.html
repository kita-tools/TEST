<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>点滴シミュレーター</title>

<style>

body {
    font-family:sans-serif;
    text-align:center;
    background:#f2f7fa;
    margin:0;
}

.box {
    background:white;
    margin:45px auto 20px;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

h2 {
    margin-top:5px;
}

.input-row {
    margin:15px auto;
    display:flex;
    justify-content:center;
    align-items:center;
}

label {
    width:90px;
    text-align:right;
    margin-right:10px;
}

input {
    width:120px;
    font-size:18px;
    padding:7px;
    text-align:center;
}

select {
    font-size:18px;
    padding:7px;
}

.unit {
    width:50px;
    text-align:left;
    margin-left:8px;
}

button {
    font-size:18px;
    padding:8px 20px;
    margin:5px;
}

#drop {
    font-size:80px;
    height:120px;
}

#mute {
    font-size:30px;
    padding:5px 15px;
}

.home {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 30px;
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
}

</style>

</head>


<body>


<div class="box">

<h2>点滴シミュレーター</h2>


<div class="input-row">
<label>滴下量</label>
<input id="ml" type="number">
<span class="unit">mL</span>
</div>


<div class="input-row">
<label>滴下時間</label>
<input id="hour" type="number" min="0.1" step="0.1">
<span class="unit">時間</span>
</div>


<div class="input-row">
<label>滴下係数</label>
<select id="type">
<option value="20">20滴</option>
<option value="60">60滴</option>
</select>
<span class="unit">/mL</span>
</div>


<button onclick="start()">
開始
</button>


<h3>滴下速度</h3>


<div id="result"></div>


<div id="drop">
💧
</div>


<button id="mute" onclick="toggleMute()">
🔇
</button>


</div>


<button class="home" onclick="goHome()">
🏠 戻る
</button>



<script>

let timer;
let mute = true;
let audioCtx;



function start(){

    let ml =
    Number(document.getElementById("ml").value);


    let hour =
    Number(document.getElementById("hour").value);


    let drip =
    Number(document.getElementById("type").value);



    if(ml <= 0){

        alert("滴下量を入力してください");

        return;

    }



    if(isNaN(hour) || hour < 0.1){

        alert("滴下時間は0.1時間以上で入力してください");

        return;

    }



    let perMin =
    (ml * drip) / (hour * 60);



    let per10 =
    perMin / 6;



    let dropInterval =
    10000 / per10;



    document.getElementById("result").innerHTML =

        "10秒あたり "
        + per10.toFixed(2)
        + "滴<br>"
        + "滴間隔 "
        + (dropInterval / 1000).toFixed(2)
        + "秒";



    clearInterval(timer);



    drop();



    timer =
    setInterval(drop, dropInterval);


}



function drop(){


    let d =
    document.getElementById("drop");

    d.innerHTML="💧";


    if(!mute){

        beep();

    }


    setTimeout(function(){

        d.innerHTML="";

    },150);


}




function beep(){


    if(!audioCtx){

        audioCtx =
        new AudioContext();

    }


    let osc =
    audioCtx.createOscillator();


    osc.connect(audioCtx.destination);


    osc.frequency.value=800;


    osc.start();


    osc.stop(audioCtx.currentTime + 0.05);


}




function toggleMute(){


    mute=!mute;


    document.getElementById("mute").innerHTML =

    mute ? "🔇" : "🔈";


}




function goHome(){

    location.href="看護ツールランチャー.HTML";

}


</script>


</body>

</html>
